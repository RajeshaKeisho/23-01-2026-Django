<h2>Book List</h2>

<table border="1">
<tr>
    <th>Title</th>
    <th>Author</th>
    <th>Price</th>
    <th>Stock</th>
</tr>

{% for book in books %}
<tr>
    <td>{{ book.title }}</td>
    <td>{{ book.author.name }}</td>
    <td>{{ book.price }}</td>
    <td>{{ book.stock }}</td>
</tr>
{% endfor %}
</table>
